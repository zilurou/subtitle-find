version: '3.8'

services:
  subtitle-find:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: subtitle-find
    ports:
      - "19251:19251"
    environment:
      - TZ=Asia/Shanghai
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      # 挂载视频目录（只读即可，字幕下载到同目录需要读写）
      - /path/to/your/videos:/videos:rw
      # 可选：挂载多个目录
      # - /path/to/movies:/movies:rw
      # - /path/to/tvshows:/tvshows:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19251/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

# 使用说明:
# 1. 修改 /path/to/your/videos 为你的视频实际路径
# 2. docker-compose up -d
# 3. 浏览器访问 http://localhost:19251
# 4. 在界面中输入 /videos（容器内挂载路径）开始刮削
