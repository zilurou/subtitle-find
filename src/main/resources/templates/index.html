<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字幕查找工具 - Web版</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <header class="row bg-primary text-white py-3 mb-4">
            <div class="col">
                <h1 class="mb-0">
                    <i class="bi bi-camera-video me-2"></i>
                    字幕查找工具
                </h1>
                <p class="mb-0">自动为视频文件下载中文字幕</p>
            </div>
        </header>

        <main class="row">
            <!-- 左侧控制面板 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-gear me-2"></i>
                            控制面板
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="searchForm">
                            <div class="mb-3">
                                <label for="directoryPath" class="form-label">
                                    <i class="bi bi-folder me-2"></i>
                                    视频目录路径
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="directoryPath"
                                       name="directoryPath"
                                       placeholder="例如: C:\Videos"
                                       required>
                                <div class="form-text">
                                    程序会递归扫描该目录下的所有视频文件
                                </div>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox"
                                       class="form-check-input"
                                       id="recursive"
                                       name="recursive"
                                       checked>
                                <label class="form-check-label" for="recursive">
                                    包含子目录
                                </label>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit"
                                        class="btn btn-primary"
                                        id="startBtn">
                                    <i class="bi bi-play-circle me-2"></i>
                                    开始查找字幕
                                </button>
                                <button type="button"
                                        class="btn btn-outline-secondary"
                                        id="clearLogBtn">
                                    <i class="bi bi-trash me-2"></i>
                                    清空日志
                                </button>
                            </div>
                        </form>

                        <!-- 状态信息 -->
                        <div class="mt-4">
                            <h6>任务状态</h6>
                            <div class="alert alert-info" id="statusAlert" style="display: none;">
                                <div class="d-flex align-items-center">
                                    <div class="spinner-border spinner-border-sm me-2"
                                         role="status"
                                         id="statusSpinner"
                                         style="display: none;">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <span id="statusText">就绪</span>
                                </div>
                            </div>
                        </div>

                        <!-- 进度条 -->
                        <div class="mt-3" id="progressContainer" style="display: none;">
                            <h6>执行进度</h6>
                            <div class="progress mb-2">
                                <div class="progress-bar"
                                     role="progressbar"
                                     id="progressBar"
                                     style="width: 0%"
                                     aria-valuenow="0"
                                     aria-valuemin="0"
                                     aria-valuemax="100">
                                    0%
                                </div>
                            </div>
                            <small class="text-muted" id="progressText">等待开始...</small>
                        </div>
                    </div>
                </div>

                <!-- 使用说明 -->
                <div class="card mt-4">
                    <div class="card-header">
                        <h6 class="card-title mb-0">
                            <i class="bi bi-info-circle me-2"></i>
                            使用说明
                        </h6>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled mb-0">
                            <li><i class="bi bi-check-circle text-success me-2"></i>支持 mp4, mkv, avi 等常见视频格式</li>
                            <li><i class="bi bi-check-circle text-success me-2"></i>自动跳过已有字幕的视频文件</li>
                            <li><i class="bi bi-check-circle text-success me-2"></i>字幕文件会自动重命名为视频文件名</li>
                            <li><i class="bi bi-check-circle text-success me-2"></i>支持 SRT, ASS, VTT 等字幕格式</li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 右侧日志面板 -->
            <div class="col-md-8">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-terminal me-2"></i>
                            执行日志
                        </h5>
                        <div>
                            <button class="btn btn-sm btn-outline-secondary" id="scrollToBottomBtn">
                                <i class="bi bi-arrow-down"></i>
                                滚动到底部
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="log-container" id="logContainer">
                            <div class="log-entry log-info">
                                <span class="log-timestamp">[2024-01-01 12:00:00]</span>
                                <span class="log-level log-level-info">[INFO]</span>
                                <span class="log-message">欢迎使用字幕查找工具 Web 版！</span>
                            </div>
                            <div class="log-entry log-info">
                                <span class="log-timestamp">[2024-01-01 12:00:00]</span>
                                <span class="log-level log-level-info">[INFO]</span>
                                <span class="log-message">请在左侧输入视频目录路径，然后点击"开始查找字幕"按钮。</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="notificationToast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">通知</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody">
                消息内容
            </div>
        </div>
    </div>

    <!-- 引入 JavaScript 库 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.2/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6.1.2/bundles/stomp.umd.min.js"></script>
    <script th:src="@{/js/app.js}"></script>
</body>
</html>
